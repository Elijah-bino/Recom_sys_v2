# Do not commit real keys. Prefer:
#   kubectl create secret generic recomsys-youtube -n recomsys \
#     --from-literal=YOUTUBE_API_KEY='YOUR_KEY' --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: recomsys-youtube
  namespace: recomsys
type: Opaque
stringData:
  YOUTUBE_API_KEY: "REPLACE_ME"
