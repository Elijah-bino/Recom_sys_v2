apiVersion: apps/v1
kind: Deployment
metadata:
  name: recomsys-api
  namespace: recomsys
  labels:
    app.kubernetes.io/name: recomsys
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: recomsys
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recomsys
        app.kubernetes.io/component: api
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: api
          image: YOUR_ACR.azurecr.io/recomsys:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: CATALOG_PATH
              value: /app/catalog_meta.csv
            - name: FRONTEND_DIR
              value: /app/frontend
            - name: DB_PATH
              value: /data/recomsys.db
            - name: CACHE_PATH
              value: /data/item_matrix.npy
            - name: YOUTUBE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: recomsys-youtube
                  key: YOUTUBE_API_KEY
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: recomsys-jwt
                  key: JWT_SECRET
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 12Gi
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: recomsys-data
