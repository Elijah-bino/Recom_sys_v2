apiVersion: v1
kind: Service
metadata:
  name: recomsys-api
  namespace: recomsys
  labels:
    app.kubernetes.io/name: recomsys
    app.kubernetes.io/component: api
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: recomsys
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
