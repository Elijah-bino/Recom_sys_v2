# Optional: set a strong JWT_SECRET for signed tokens (defaults to insecure dev value if unset).
#   kubectl create secret generic recomsys-jwt -n recomsys \
#     --from-literal=JWT_SECRET='long-random-string' --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: recomsys-jwt
  namespace: recomsys
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_LONG_RANDOM_STRING"
